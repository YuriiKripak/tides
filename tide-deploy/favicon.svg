<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="fc"><circle cx="32" cy="32" r="25"/></clipPath>
    <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0fb8a8" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#086e82" stop-opacity=".48"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="36%" r="64%">
      <stop offset="0%"   stop-color="#182e4d"/>
      <stop offset="100%" stop-color="#07101e"/>
    </radialGradient>
  </defs>

  <!-- Full rect background — teal-tinted dark, readable on both light and dark home screens -->
  <rect width="64" height="64" fill="#082030"/>

  <!-- Bezel ring -->
  <circle cx="32" cy="32" r="29" fill="url(#bg)" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <circle cx="32" cy="32" r="26.5" fill="none" stroke="rgba(15,184,168,.2)" stroke-width=".5"/>

  <!-- Face -->
  <circle cx="32" cy="32" r="25" fill="#081424"/>

  <!-- Water fill (~80% full) -->
  <rect x="7" y="27" width="50" height="22" fill="url(#wg)" clip-path="url(#fc)"/>

  <!-- Wave shimmer -->
  <path d="M7,27 Q12,24.5 17,27 Q22,29.5 27,27 Q32,24.5 37,27 Q42,29.5 47,27 Q52,24.5 57,27 L57,29 Q52,26.5 47,29 Q42,31.5 37,29 Q32,26.5 27,29 Q22,31.5 17,29 Q12,26.5 7,29 Z"
        fill="rgba(15,220,200,.18)" clip-path="url(#fc)"/>

  <!-- Water surface highlight -->
  <line x1="7" y1="27" x2="57" y2="27" stroke="rgba(15,220,200,.35)" stroke-width="1" clip-path="url(#fc)"/>

  <!-- Face ring -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="rgba(15,184,168,.3)" stroke-width=".75"/>

  <!-- Tick marks (major) -->
  <g stroke="rgba(112,151,184,.55)" stroke-width="1.2" stroke-linecap="round">
    <line x1="32" y1="7"  x2="32" y2="10"/>
    <line x1="57" y1="32" x2="54" y2="32"/>
    <line x1="32" y1="57" x2="32" y2="54"/>
    <line x1="7"  y1="32" x2="10" y2="32"/>
  </g>

  <!-- Needle shadow -->
  <line x1="33" y1="33" x2="47" y2="16"
        stroke="rgba(0,0,0,.4)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Needle shaft -->
  <line x1="32" y1="33" x2="46" y2="16"
        stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="46,14 42.5,19.5 49.5,19.5" fill="#f59e0b"/>
  <!-- Counterweight -->
  <line x1="32" y1="33" x2="27" y2="40"
        stroke="#f59e0b" stroke-width="1.6" stroke-linecap="round" opacity=".45"/>

  <!-- Pivot -->
  <circle cx="32" cy="33" r="4"   fill="#06101e" stroke="rgba(15,184,168,.6)" stroke-width="1.5"/>
  <circle cx="32" cy="33" r="2"   fill="#0fb8a8"/>
  <circle cx="32" cy="33" r=".9"  fill="#d8e8f2"/>
</svg>
