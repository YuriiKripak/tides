<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tide Walk Score · Myrtle Beach</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#05091a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tide Walk">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05091a;--teal:#0fb8a8;--amber:#f59e0b;
  --orange:#fb923c;--sky:#7dd3fc;
  --text:#d8e8f2;--muted:#4e6e88;
  --glass:rgba(8,18,36,.88);--bdr:rgba(255,255,255,.09)
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg)}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;
  color:var(--text);display:flex;justify-content:center
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 40% at 50% 105%,rgba(15,184,168,.07) 0%,transparent 55%),
    radial-gradient(ellipse 50% 30% at 15% 5%,rgba(30,80,180,.06) 0%,transparent 50%);
  pointer-events:none;z-index:0
}
.app{
  position:relative;z-index:1;
  width:100%;max-width:390px;min-height:100svh;
  display:flex;flex-direction:column;
  padding:max(env(safe-area-inset-top),16px) 18px max(env(safe-area-inset-bottom),10px)
}
.app::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:linear-gradient(180deg,rgba(3,7,16,.18),rgba(3,7,16,.28));
  pointer-events:none
}

/* ── HEADER ── */
.hdr{display:grid;grid-template-columns:minmax(118px,1fr) auto minmax(78px,1fr);align-items:start;gap:10px;padding-bottom:4px}
.hdr-place{min-width:0}
.loc-name{font-size:19px;font-weight:500;letter-spacing:.02em;line-height:1;white-space:nowrap}
.loc-sub{
  font-size:9.8px;font-weight:600;
  color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;white-space:nowrap
}
.hdr-side{justify-self:end;display:flex;align-items:flex-start}
.weather-readout{
  justify-self:center;display:flex;align-items:center;gap:6px;color:var(--text);
  text-shadow:0 0 18px rgba(125,211,252,.12)
}
.wx-icon{font-size:17px;line-height:1}
.wx-temp{font-size:25px;font-weight:850;letter-spacing:.01em;line-height:.96}
.wx-controls{
  display:flex;align-items:center;gap:5px;
  background:var(--glass);border:1px solid var(--bdr);
  border-radius:18px;padding:4px 6px;
  backdrop-filter:blur(14px) saturate(1.25);
  -webkit-backdrop-filter:blur(14px) saturate(1.25)
}

/* ── LANG (globe cycle in header) ── */
.wx-lang{
  font:inherit;font-size:12px;font-weight:700;
  letter-spacing:.06em;color:var(--teal);background:none;border:none;
  padding:3px 7px;border-radius:12px;cursor:pointer;
  display:flex;align-items:center;gap:4px;transition:background .15s
}
.wx-motion{
  width:28px;height:28px;border:1px solid rgba(125,211,252,.14);border-radius:50%;
  display:grid;place-items:center;cursor:pointer;
  font:inherit;font-size:10px;font-weight:800;color:#7f9bb2;
  background:rgba(255,255,255,.06);
  transition:background .15s,color .15s,box-shadow .15s
}
.wx-motion[aria-pressed="true"]{color:var(--teal);background:rgba(15,184,168,.16);box-shadow:0 0 10px rgba(15,184,168,.22)}
.wx-lang:active,.wx-motion:active{background:rgba(15,184,168,.18)}
@keyframes lf{
  0%{opacity:1;transform:translateY(0)}
  45%{opacity:0;transform:translateY(-5px)}
  55%{opacity:0;transform:translateY(5px)}
  100%{opacity:1;transform:translateY(0)}
}
#lang-label{display:inline-block;min-width:18px;text-align:center}
.la{animation:lf .22s ease}

/* ── WEATHER BG ── */
#wxcanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
#wxbg{display:none}

/* ── DIAL ── */
.dial-wrap{display:flex;justify-content:center;padding:2px 0}
.dial{
  width:100%;max-width:360px;height:auto;overflow:visible;
  filter:drop-shadow(0 6px 36px rgba(15,184,168,.09))
}
#score-beacon{transition:fill .25s ease,opacity .25s ease;transform-origin:180px 180px}
@keyframes scorePulse{
  0%,100%{opacity:.86;transform:scale(1);stroke-width:1.1}
  50%{opacity:1;transform:scale(1.18);stroke-width:2.2}
}
body.motion-on #score-beacon{animation:scorePulse 1.8s ease-in-out infinite}

/* Wave animations */
@keyframes wave1{from{transform:translateX(0)}to{transform:translateX(180px)}}
@keyframes wave2{from{transform:translateX(0)}to{transform:translateX(270px)}}
body.motion-on .wave1{animation:wave1 4s linear infinite}
body.motion-on .wave2{animation:wave2 2.8s linear infinite}

@keyframes settle{
  0%  {transform:rotate(-85deg);opacity:0}
  25% {opacity:1}
  72% {transform:rotate(36deg)}
  84% {transform:rotate(25deg)}
  93% {transform:rotate(31deg)}
  100%{transform:rotate(30deg)}
}
.ng{transform-origin:180px 180px;animation:settle 2.2s cubic-bezier(.22,.68,0,1.2) .5s both}

@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hdr     {animation:up .5s ease  0s   both}
.dial-wrap{animation:up .5s ease .12s both}
.status  {animation:up .5s ease .30s both}
.grid    {animation:up .5s ease .40s both}
.foot    {animation:up .5s ease .50s both}

/* ── STATUS ── */
.status{
  text-align:center;padding:5px 0 8px;
  display:flex;flex-direction:column;align-items:center;gap:1px
}
.st-ey{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
  font-size:9.8px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;color:#66849d
}
.st-main{
  font-size:30px;font-weight:850;letter-spacing:.04em;
  text-transform:uppercase;line-height:1;color:var(--text)
}
.st-next{font-size:13px;font-weight:550;color:var(--muted);letter-spacing:0}
.st-next .t{color:var(--teal);font-weight:500}
.st-next .d{color:var(--amber)}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(3,minmax(86px,1fr));gap:6px;flex:1;align-content:stretch}
.card{
  background:rgba(6,14,28,.91);border:1px solid var(--bdr);
  border-radius:11px;padding:12px 14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 8px 24px rgba(0,0,0,.16);
  backdrop-filter:blur(16px) saturate(1.2);
  -webkit-backdrop-filter:blur(16px) saturate(1.2);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:center
}
.card::after{
  content:'';position:absolute;inset:0 0 auto 0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)
}
/* Semantic danger levels */
.card.safe{
  background:linear-gradient(rgba(6,14,28,.89),rgba(6,14,28,.89)),rgba(34,197,94,.20);
  border-color:rgba(74,222,128,.34)
}
.card.caution{
  background:linear-gradient(rgba(6,14,28,.89),rgba(6,14,28,.89)),rgba(234,179,8,.20);
  border-color:rgba(253,224,71,.34)
}
.card.danger{
  background:linear-gradient(rgba(6,14,28,.89),rgba(6,14,28,.89)),rgba(239,68,68,.22);
  border-color:rgba(248,113,113,.36)
}
.card.info{
  background:linear-gradient(rgba(6,14,28,.89),rgba(6,14,28,.89)),rgba(15,184,168,.18);
  border-color:rgba(45,212,191,.32)
}
.card.primary{
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 10px 28px rgba(0,0,0,.2)
}
.card.primary .cv{font-size:35px;font-weight:800}
.card.factor{
  background:rgba(6,14,28,.84);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 6px 18px rgba(0,0,0,.13)
}
.card.factor .cv{font-size:29px;font-weight:720}
.card.factor .cl{color:#66849d}

/* Danger dot indicator */
.cl{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
  font-size:10.8px;font-weight:650;
  letter-spacing:.09em;text-transform:uppercase;color:#6f8da5;
  margin-bottom:5px;display:flex;align-items:center;gap:5px
}
.cl::before{
  content:'';display:inline-block;
  width:5px;height:5px;border-radius:50%;flex-shrink:0
}
.card.safe    .cl::before{background:#22c55e;box-shadow:0 0 5px rgba(34,197,94,.7)}
.card.caution .cl::before{background:#eab308;box-shadow:0 0 5px rgba(234,179,8,.7)}
.card.danger  .cl::before{background:#ef4444;box-shadow:0 0 5px rgba(239,68,68,.7)}
.card.info    .cl::before{background:var(--teal);box-shadow:0 0 5px rgba(15,184,168,.5)}
.card:not(.safe):not(.caution):not(.danger):not(.info) .cl::before{background:var(--muted);opacity:.4}

.cv{font-size:32px;font-weight:750;letter-spacing:0;line-height:1.15;color:var(--text)}
.card.safe    .cv{color:#4ade80}
.card.caution .cv{color:#fde047}
.card.danger  .cv{color:#f87171}
.card.info    .cv{color:var(--teal)}
.cv small{font-size:14px;font-weight:500;color:#6a8499}
.cv.walk-time{font-size:24px;line-height:1.05;white-space:nowrap}
.cv.walk-time small{font-size:12px}

@media (max-width:340px){
  .hdr{grid-template-columns:minmax(0,1fr) auto}
  .weather-readout{display:none}
}

/* ── FOOTER ── */
.foot{
  text-align:center;margin-top:5px;
  font-size:8px;font-weight:600;
  letter-spacing:.11em;color:rgba(78,110,136,.45);text-transform:uppercase
}
</style>
</head>
<body>
<canvas id="wxcanvas"></canvas>
<div id="wxbg" class="storm" aria-hidden="true"></div>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-place">
      <div class="loc-name">Myrtle Beach</div>
      <div class="loc-sub" data-i18n="loc-sub">Local time · --:--</div>
    </div>
    <div class="weather-readout" aria-label="Current weather">
      <span class="wx-icon">⛈️</span>
      <span class="wx-temp" data-i18n="val-wx-temp">75 °F</span>
    </div>
    <div class="hdr-side">
      <div class="wx-controls" aria-label="Display controls">
        <button class="wx-motion" id="motion-btn" type="button" aria-label="Start weather animation" aria-pressed="false">▶</button>
        <button class="wx-lang" id="lang-btn">🌐 <span id="lang-label">EN</span></button>
      </div>
    </div>
  </div>

  <!-- DIAL -->
  <div class="dial-wrap">
    <svg class="dial" viewBox="-10 0 380 360" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="gBezel" cx="50%" cy="36%" r="64%">
          <stop offset="0%"   stop-color="#182e4d"/>
          <stop offset="100%" stop-color="#07101e"/>
        </radialGradient>
        <radialGradient id="gFace" cx="50%" cy="36%" r="64%">
          <stop offset="0%"   stop-color="#0d1f3a"/>
          <stop offset="65%"  stop-color="#081424"/>
          <stop offset="100%" stop-color="#050c17"/>
        </radialGradient>
        <!-- Water body gradient: deep teal at bottom, lighter at surface -->
        <linearGradient id="gWater" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="rgba(15,184,168,.18)"/>
          <stop offset="100%" stop-color="rgba(8,110,130,.36)"/>
        </linearGradient>
        <!-- Clip everything to the circular face -->
        <clipPath id="faceClip">
          <circle cx="180" cy="180" r="139"/>
        </clipPath>
        <filter id="ft" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="fa" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="scoreGlow" x="-120%" y="-120%" width="340%" height="340%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Left half CCW top→left→bottom — letters face inward (rightward) -->
        <path id="aHi" d="M 180,22 A 158,158 0 0,0 180,338"/>
        <!-- Right half CCW bottom→right→top — letters face inward (leftward) -->
        <path id="aLo" d="M 180,338 A 158,158 0 0,0 180,22"/>
      </defs>

      <!-- Bezel -->
      <circle cx="180" cy="180" r="170" fill="url(#gBezel)" stroke="rgba(255,255,255,.05)" stroke-width=".75"/>
      <circle cx="180" cy="180" r="146" fill="none" stroke="rgba(15,184,168,.12)" stroke-width=".5"/>

      <!-- Bezel arc labels — centered on full half-circles -->
      <text font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif"
            font-size="12" font-weight="650" fill="rgba(145,185,215,.88)"
            letter-spacing=".9" text-anchor="middle">
        <textPath id="tp-hi" href="#aHi" startOffset="50%">HOURS TO HIGH TIDE</textPath>
      </text>
      <text font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif"
            font-size="12" font-weight="650" fill="rgba(145,185,215,.88)"
            letter-spacing=".9" text-anchor="middle">
        <textPath id="tp-lo" href="#aLo" startOffset="50%">HOURS TO LOW TIDE</textPath>
      </text>

      <!-- SUFFER / WALK in bezel band -->
      <text x="180" y="27" dominant-baseline="central"
            font-family="'Barlow Condensed',sans-serif" font-weight="900"
            font-size="17" fill="#fb923c" text-anchor="middle"
            letter-spacing="8" filter="url(#fa)">SUFFER</text>
      <text x="180" y="333" dominant-baseline="central"
            font-family="'Barlow Condensed',sans-serif" font-weight="900"
            font-size="17" fill="#0fb8a8" text-anchor="middle"
            letter-spacing="11" filter="url(#ft)">WALK</text>

      <!-- Face background -->
      <circle cx="180" cy="180" r="140" fill="url(#gFace)"/>

      <!--
        TIDE LEVEL FILL
        Water level = 4.95 ft. Myrtle Beach tidal range ≈ 0–6 ft.
        4.95 / 6 ≈ 82% full.
        Face top y=40, bottom y=320, height=280.
        Water surface y = 40 + 280*(1-0.82) = 40 + 50 = 90
      -->

      <!-- Static water body -->
      <rect x="41" y="90" width="278" height="230"
            fill="url(#gWater)" clip-path="url(#faceClip)"/>

      <!-- Wave layer 1 — slow -->
      <g clip-path="url(#faceClip)">
        <path class="wave1"
          d="M -180,90 Q -135,79 -90,90 Q -45,101 0,90 Q 45,79 90,90 Q 135,101 180,90 Q 225,79 270,90 Q 315,101 360,90 Q 405,79 450,90 Q 495,101 540,90 L 540,320 L -180,320 Z"
          fill="rgba(15,184,168,.13)"/>
      </g>

      <!-- Wave layer 2 — fast, offset phase -->
      <g clip-path="url(#faceClip)">
        <path class="wave2"
          d="M -270,92 Q -225,82 -180,92 Q -135,102 -90,92 Q -45,82 0,92 Q 45,102 90,92 Q 135,82 180,92 Q 225,102 270,92 Q 315,82 360,92 Q 405,102 450,92 Q 495,82 540,92 L 540,320 L -270,320 Z"
          fill="rgba(15,184,168,.09)"/>
      </g>

      <!-- Subtle surface highlight line -->
      <line x1="41" y1="90" x2="319" y2="90"
            stroke="rgba(15,220,200,.25)" stroke-width=".75"
            clip-path="url(#faceClip)"/>

      <!-- Face border ring -->
      <circle cx="180" cy="180" r="140" fill="none" stroke="rgba(15,184,168,.2)" stroke-width=".75"/>

      <!-- Ticks + numbers injected by JS -->
      <g id="ticks"/>
      <g id="nums"
         font-family="'Barlow Condensed',sans-serif" font-weight="700" font-size="19"
         text-anchor="middle" dominant-baseline="central"/>

      <!-- Needle -->
      <g class="ng">
        <!-- drop shadow -->
        <line x1="181" y1="193" x2="181" y2="68"
              stroke="rgba(0,0,0,.45)" stroke-width="4" stroke-linecap="round"/>
        <!-- counterweight tail -->
        <line x1="180" y1="192" x2="174" y2="215"
              stroke="var(--amber)" stroke-width="2.5" stroke-linecap="round" opacity=".45"/>
        <!-- shaft -->
        <line x1="180" y1="192" x2="180" y2="75"
              stroke="var(--amber)" stroke-width="2" stroke-linecap="round"/>
        <!-- arrowhead -->
        <polygon points="180,67 175,79 185,79" fill="var(--amber)" filter="url(#fa)"/>
      </g>

      <!-- Pivot -->
      <circle id="score-beacon" cx="180" cy="180" r="13" fill="#eab308" stroke="rgba(255,255,255,.58)" stroke-width="1.1" filter="url(#scoreGlow)"/>
      <circle cx="180" cy="180" r="6.5" fill="#06101e" stroke="rgba(255,255,255,.26)" stroke-width="1"/>
      <circle cx="180" cy="180" r="2"   fill="#d8e8f2"/>
    </svg>
  </div>

  <!-- STATUS -->
  <div class="status">
    <span class="st-ey" data-i18n="st-ey">Current condition</span>
    <span class="st-main" data-i18n="st-main">Falling Tide</span>
    <span class="st-next">
      <span data-i18n="next-low">Next low</span>
      <span class="t">09:12 AM</span> ·
      <span data-i18n="in-word">in</span>
      <span class="d">5 h 12 m</span>
    </span>
  </div>

  <!-- DATA GRID -->
  <div class="grid">
    <div class="card primary caution" id="score-card">
      <div class="cl" data-i18n="tide-walk-score">Tide Walk Score</div>
      <div class="cv"><span id="score-value">61</span><small> · <span id="score-label">fair</span></small></div>
    </div>
    <div class="card primary info">
      <div class="cl" data-i18n="walk-window">Walk Window</div>
      <div class="cv walk-time">08:12 10:42</div>
    </div>
    <div class="card factor safe">
      <div class="cl" data-i18n="water-temp">Water Temp</div>
      <div class="cv"><span data-i18n="val-water-temp">79°F</span></div>
    </div>
    <div class="card factor caution">
      <div class="cl" data-i18n="wind">Wind</div>
      <div class="cv"><span data-i18n="val-wind">S · 10–15</span><small data-i18n="unit-wind"> mph</small></div>
    </div>
    <div class="card factor safe">
      <div class="cl" data-i18n="uv-index">UV Index</div>
      <div class="cv">0.0<small data-i18n="low-val"> · low</small></div>
    </div>
    <div class="card factor caution">
      <div class="cl" data-i18n="surf-height">Surf Height</div>
      <div class="cv"><span data-i18n="val-surf-height">2–3</span><small data-i18n="unit-surf-height"> ft</small></div>
    </div>
  </div>

  <div class="foot" data-i18n="data-updated">NOAA data · updated 04:00</div>

</div>
<script>
(function(){
  /* ── Translations ── */
  const T = {
    en: {
      'loc-label':    'Local time',
      'st-ey':        'Current condition',
      'st-main':      'Falling Tide',
      'next-low':     'Next low',
      'in-word':      'in',
      'walk-window':  'Walk Window',
      'uv-index':     'UV Index',
      'low-val':      ' · low',
      'water-temp':   'Water Temp',
      'wind':         'Wind',
      'tide-walk-score':'Tide Walk Score',
      'score-excellent':'excellent',
      'score-good':   'good',
      'score-fair':   'fair',
      'score-poor':   'poor',
      'score-avoid':  'avoid',
      'surf-height':  'Surf Height',
      'bezel-hi':     'HOURS TO HIGH TIDE',
      'bezel-lo':     'HOURS TO LOW TIDE',
      'val-wx-temp':  '75 °F',
      'val-water-temp':'79°F',
      'val-wind':     'S · 10–15',
      'unit-wind':    ' mph',
      'val-surf-height':'2–3',
      'unit-surf-height':' ft',
      'data-updated': 'NOAA data · updated 04:00',
    },
    ru: {
      'loc-label':    'Местное время',
      'st-ey':        'Текущее состояние',
      'st-main':      'Спад прилива',
      'next-low':     'Следующий отлив',
      'in-word':      'через',
      'walk-window':  'Время прогулки',
      'uv-index':     'УФ индекс',
      'low-val':      ' · низкий',
      'water-temp':   'Темп. воды',
      'wind':         'Ветер',
      'tide-walk-score':'Оценка прогулки',
      'score-excellent':'отлично',
      'score-good':   'хорошо',
      'score-fair':   'нормально',
      'score-poor':   'плохо',
      'score-avoid':  'не стоит',
      'surf-height':  'Высота волн',
      'bezel-hi':     'ЧАСОВ ДО ПРИЛИВА',
      'bezel-lo':     'ЧАСОВ ДО ОТЛИВА',
      'val-wx-temp':  '24 °C',
      'val-water-temp':'26°C',
      'val-wind':     'Ю · 16–24',
      'unit-wind':    ' км/ч',
      'val-surf-height':'0.6–0.9',
      'unit-surf-height':' м',
      'data-updated': 'Данные NOAA · обновлено 04:00',
    },
    ua: {
      'loc-label':    'Місцевий час',
      'st-ey':        'Поточний стан',
      'st-main':      'Спад припливу',
      'next-low':     'Наступний відлив',
      'in-word':      'через',
      'walk-window':  'Час прогулянки',
      'uv-index':     'УФ індекс',
      'low-val':      ' · низький',
      'water-temp':   'Темп. води',
      'wind':         'Вітер',
      'tide-walk-score':'Оцінка прогулянки',
      'score-excellent':'відмінно',
      'score-good':   'добре',
      'score-fair':   'нормально',
      'score-poor':   'погано',
      'score-avoid':  'не варто',
      'surf-height':  'Висота хвиль',
      'bezel-hi':     'ГОДИН ДО ПРИПЛИВУ',
      'bezel-lo':     'ГОДИН ДО ВІДПЛИВУ',
      'val-wx-temp':  '24 °C',
      'val-water-temp':'26°C',
      'val-wind':     'Пд · 16–24',
      'unit-wind':    ' км/год',
      'val-surf-height':'0.6–0.9',
      'unit-surf-height':' м',
      'data-updated': 'Дані NOAA · оновлено 04:00',
    },
    es: {
      'loc-label':    'Hora local',
      'st-ey':        'Estado actual',
      'st-main':      'Marea bajando',
      'next-low':     'Próxima bajamar',
      'in-word':      'en',
      'walk-window':  'Ventana paseo',
      'uv-index':     'Índice UV',
      'low-val':      ' · bajo',
      'water-temp':   'Temp. agua',
      'wind':         'Viento',
      'tide-walk-score':'Puntaje paseo',
      'score-excellent':'excelente',
      'score-good':   'bueno',
      'score-fair':   'regular',
      'score-poor':   'malo',
      'score-avoid':  'evitar',
      'surf-height':  'Altura olas',
      'bezel-hi':     'HORAS A PLEAMAR',
      'bezel-lo':     'HORAS A BAJAMAR',
      'val-wx-temp':  '24 °C',
      'val-water-temp':'26°C',
      'val-wind':     'S · 16–24',
      'unit-wind':    ' km/h',
      'val-surf-height':'0.6–0.9',
      'unit-surf-height':' m',
      'data-updated': 'Datos NOAA · actualizado 04:00',
    },
  };

  const timeLocales = { en:'en-US', ru:'ru-RU', ua:'uk-UA', es:'es-ES' };

  function formatLocalTime(lang) {
    return new Intl.DateTimeFormat(timeLocales[lang] || timeLocales.en, {
      timeZone: 'America/New_York',
      hour: '2-digit',
      minute: '2-digit',
    }).format(new Date());
  }

  function updateLocalTime(lang = currentLang) {
    const d = T[lang] || T.en;
    const el = document.querySelector('[data-i18n="loc-sub"]');
    if (el) el.textContent = `${d['loc-label']} · ${formatLocalTime(lang)}`;
  }

  function scoreBand(score) {
    if (score >= 85) return { key:'score-excellent', cls:'safe', color:'#22c55e' };
    if (score >= 70) return { key:'score-good', cls:'safe', color:'#4ade80' };
    if (score >= 50) return { key:'score-fair', cls:'caution', color:'#eab308' };
    if (score >= 30) return { key:'score-poor', cls:'danger', color:'#fb923c' };
    return { key:'score-avoid', cls:'danger', color:'#ef4444' };
  }

  function calculateTideWalkScore(weatherState = document.body.dataset.weather || 'storm') {
    const factors = {
      tideWindow: 66,
      uv: 100,
      waterTemp: 92,
      wind: 68,
      surf: 62,
      tideLevel: 55,
      weather: ({ sunny:88, 'partly-cloudy':90, cloudy:78, rain:55, storm:20, 'clear-night':84 })[weatherState] ?? 70,
    };
    let score = Math.round(
      factors.tideWindow*.35 + factors.weather*.20 + factors.wind*.15 +
      factors.surf*.10 + factors.uv*.10 + factors.waterTemp*.05 + factors.tideLevel*.05
    );
    const caps = { rain:75, storm:35 };
    if (caps[weatherState] != null) score = Math.min(score, caps[weatherState]);
    return Math.max(0, Math.min(100, score));
  }

  window.updateTideWalkScore = function updateTideWalkScore(weatherState) {
    const score = calculateTideWalkScore(weatherState);
    const band = scoreBand(score);
    const d = T[currentLang] || T.en;
    const card = document.getElementById('score-card');
    const value = document.getElementById('score-value');
    const label = document.getElementById('score-label');
    const beacon = document.getElementById('score-beacon');
    if (card) card.className = `card primary ${band.cls}`;
    if (value) value.textContent = String(score);
    if (label) label.textContent = d[band.key];
    if (beacon) beacon.setAttribute('fill', band.color);
  };

  function applyLang(lang) {
    const d = T[lang] || T.en;
    document.documentElement.lang = lang === 'ua' ? 'uk' : lang;
    // HTML elements
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (d[key] != null) el.textContent = d[key];
    });
    updateLocalTime(lang);
    // SVG textPath elements
    const tpHi = document.getElementById('tp-hi');
    const tpLo = document.getElementById('tp-lo');
    if (tpHi) tpHi.textContent = d['bezel-hi'];
    if (tpLo) tpLo.textContent = d['bezel-lo'];
    if (window.updateTideWalkScore) window.updateTideWalkScore();
  }

  /* ── Tick marks ── */
  const X=180,Y=180,NR=105;
  const tg=document.getElementById('ticks');
  for(let i=0;i<60;i++){
    const a=i/60*2*Math.PI-Math.PI/2,maj=i%5===0;
    const r1=138,r2=maj?121:129;
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',(X+r1*Math.cos(a)).toFixed(2));
    l.setAttribute('y1',(Y+r1*Math.sin(a)).toFixed(2));
    l.setAttribute('x2',(X+r2*Math.cos(a)).toFixed(2));
    l.setAttribute('y2',(Y+r2*Math.sin(a)).toFixed(2));
    l.setAttribute('stroke',maj?'rgba(112,151,184,.65)':'rgba(112,151,184,.27)');
    l.setAttribute('stroke-width',maj?'1.8':'1');
    l.setAttribute('stroke-linecap','round');
    tg.appendChild(l);
  }

  /* ── Numbers ── */
  const ng=document.getElementById('nums');
  // Left orange — hours to HIGH TIDE: 1@330° … 5@210°
  [330,300,270,240,210].forEach((d,i)=>{
    const r=(d-90)*Math.PI/180;
    const el=document.createElementNS('http://www.w3.org/2000/svg','text');
    el.setAttribute('x',(X+NR*Math.cos(r)).toFixed(1));
    el.setAttribute('y',(Y+NR*Math.sin(r)).toFixed(1));
    el.setAttribute('fill','#fb923c');el.setAttribute('opacity','.88');
    el.textContent=String(i+1);ng.appendChild(el);
  });
  // Right sky — hours to LOW TIDE: 5@30° … 1@150°
  [30,60,90,120,150].forEach((d,i)=>{
    const r=(d-90)*Math.PI/180;
    const el=document.createElementNS('http://www.w3.org/2000/svg','text');
    el.setAttribute('x',(X+NR*Math.cos(r)).toFixed(1));
    el.setAttribute('y',(Y+NR*Math.sin(r)).toFixed(1));
    el.setAttribute('fill','#7dd3fc');el.setAttribute('opacity','.88');
    el.textContent=String(5-i);ng.appendChild(el);
  });

  /* ── Language cycler (globe tap) ── */
  const langSeq=['en','ru','ua','es'],langCode={en:'EN',ru:'RU',ua:'UA',es:'ES'};
  let langIdx=0,currentLang='en';
  applyLang(currentLang);
  setInterval(()=>updateLocalTime(currentLang),60000);
  document.getElementById('lang-btn').addEventListener('click',()=>{
    langIdx=(langIdx+1)%langSeq.length;
    currentLang=langSeq[langIdx];
    const lbl=document.getElementById('lang-label');
    lbl.classList.remove('la');void lbl.offsetWidth;lbl.classList.add('la');
    lbl.textContent=langCode[currentLang];
    applyLang(currentLang);
  });
})();

/* ── Canvas Weather Renderer ── */
(function(){
  const canvas=document.getElementById('wxcanvas');
  const wxbg=document.getElementById('wxbg');
  if(!canvas||!wxbg) return;
  const ctx=canvas.getContext('2d');
  let W=0,H=0,particles=[],wxState='storm',driftT=0,lastTime=0,lightningAlpha=0,nextLightning=5,rafId=0;
  let motionEnabled=false;
  const motionBtn=document.getElementById('motion-btn');

  const ICONS={
    storm:'⛈️',rain:'🌧️',cloudy:'☁️','partly-cloudy':'⛅',
    sunny:'☀️','clear-night':'🌙'
  };
  const SKIES={
    storm:[['#16082e',0],['#0b051c',.55],['#040210',1]],
    rain:[['#141830',0],['#0a0d1e',.55],['#04060e',1]],
    cloudy:[['#20294a',0],['#101528',.56],['#050710',1]],
    'partly-cloudy':[['#0c1d48',0],['#071225',.6],['#03080e',1]],
    sunny:[['#102b73',0],['#071840',.5],['#030a18',1]],
    'clear-night':[['#03050e',0],['#020408',.6],['#010204',1]]
  };
  const CLOUDS={
    storm:[
      {x:-.05,y:-.08,w:.75,h:.38,tc:'rgba(95,72,170,.9)',bc:'rgba(60,42,130,.7)',a:.88},
      {x:.28,y:-.12,w:.85,h:.42,tc:'rgba(80,60,155,.85)',bc:'rgba(48,34,118,.65)',a:.82},
      {x:-.1,y:.14,w:.65,h:.3,tc:'rgba(110,85,185,.8)',bc:'rgba(68,50,142,.6)',a:.75},
      {x:.45,y:.1,w:.7,h:.32,tc:'rgba(72,55,148,.75)',bc:'rgba(45,32,112,.55)',a:.7}
    ],
    rain:[
      {x:-.08,y:-.06,w:.7,h:.35,tc:'rgba(65,70,125,.88)',bc:'rgba(42,46,100,.68)',a:.85},
      {x:.3,y:-.1,w:.78,h:.38,tc:'rgba(55,60,112,.82)',bc:'rgba(35,40,90,.62)',a:.78},
      {x:-.12,y:.16,w:.6,h:.28,tc:'rgba(75,80,138,.75)',bc:'rgba(50,55,108,.56)',a:.7}
    ],
    cloudy:[
      {x:-.16,y:-.12,w:.88,h:.44,tc:'rgba(88,98,155,.96)',bc:'rgba(52,60,118,.78)',a:.96},
      {x:.22,y:-.16,w:.96,h:.46,tc:'rgba(72,82,140,.92)',bc:'rgba(42,50,108,.72)',a:.92},
      {x:-.14,y:.16,w:.74,h:.34,tc:'rgba(98,108,165,.86)',bc:'rgba(60,68,128,.66)',a:.84},
      {x:.38,y:.12,w:.78,h:.36,tc:'rgba(78,88,145,.82)',bc:'rgba(46,54,112,.62)',a:.8}
    ],
    'partly-cloudy':[
      {x:-.15,y:-.18,w:.55,h:.28,tc:'rgba(100,112,175,.7)',bc:'rgba(70,82,148,.52)',a:.72},
      {x:.55,y:-.22,w:.6,h:.3,tc:'rgba(90,102,165,.65)',bc:'rgba(62,74,140,.48)',a:.65}
    ],
    sunny:[
      {x:.35,y:-.28,w:.45,h:.22,tc:'rgba(120,140,200,.45)',bc:'rgba(85,105,170,.32)',a:.4}
    ],
    'clear-night':[]
  };

  function resize(){
    const isMobile=window.matchMedia('(max-width: 640px)').matches;
    const dpr=Math.min(window.devicePixelRatio||1,isMobile?1.5:2);
    W=canvas.width=Math.floor(window.innerWidth*dpr);
    H=canvas.height=Math.floor(window.innerHeight*dpr);
    canvas.style.width=window.innerWidth+'px';
    canvas.style.height=window.innerHeight+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    W=window.innerWidth;H=window.innerHeight;
    initParticles(wxState);
    renderStatic();
  }

  function rng(seed){
    const x=Math.sin(seed*9301+49297)*233280;
    return x-Math.floor(x);
  }
  const STARS=Array.from({length:150},(_,i)=>({
    x:rng(i*3+1),y:rng(i*2+2)*.65,r:rng(i*5+3)*1.6+.4,op:rng(i*7+4)*.55+.3
  }));

  function initParticles(state){
    particles=[];
    const isMobile=window.matchMedia('(max-width: 640px)').matches;
    const reduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const scale=isMobile?.65:1;
    const n=reduced?0:Math.round((state==='storm'?120:state==='rain'?80:0)*scale);
    for(let i=0;i<n;i++){
      particles.push({
        x:Math.random()*W,y:Math.random()*H,
        speed:Math.random()*6+(state==='storm'?10:6),
        len:Math.random()*12+7,
        op:Math.random()*.18+(state==='storm'?.1:.08)
      });
    }
  }

  function setWxState(state){
    if(!SKIES[state]) state='storm';
    wxState=state;
    wxbg.className=state;
    document.body.dataset.weather=state;
    const icon=document.querySelector('.wx-icon');
    if(icon) icon.textContent=ICONS[state];
    initParticles(state);
    if(window.updateTideWalkScore) window.updateTideWalkScore(state);
    renderStatic();
  }
  window.setWeatherState=setWxState;

  function drawCloud(x,y,w,h,topColor,botColor,alpha){
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.shadowBlur=18;
    ctx.shadowColor=topColor;
    [
      {dx:.12,dy:.55,r:.38},{dx:.3,dy:.38,r:.44},{dx:.5,dy:.32,r:.5},
      {dx:.7,dy:.4,r:.42},{dx:.87,dy:.55,r:.36}
    ].forEach(b=>{
      const bx=x+b.dx*w,by=y+b.dy*h,br=b.r*h;
      const g=ctx.createRadialGradient(bx,by-br*.2,br*.1,bx,by,br);
      g.addColorStop(0,topColor);g.addColorStop(.6,botColor);g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    });
    ctx.shadowBlur=0;
    const baseY=y+h*.65,baseH=h*.35,bg=ctx.createLinearGradient(0,baseY,0,baseY+baseH);
    bg.addColorStop(0,botColor);bg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.rect(x+w*.08,baseY,w*.84,baseH);ctx.fillStyle=bg;ctx.fill();
    ctx.restore();
  }

  function renderScene(dt,{animated=false}={}){
    if(animated) driftT+=dt;
    ctx.clearRect(0,0,W,H);

    const skyGrad=ctx.createLinearGradient(0,0,0,H);
    SKIES[wxState].forEach(([c,p])=>skyGrad.addColorStop(p,c));
    ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,H);

    if(wxState==='sunny'||wxState==='partly-cloudy'){
      const sx=W*.9,sy=H*-.04,sr=Math.min(W,H)*(wxState==='sunny'?.58:.4);
      const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,sr);
      sg.addColorStop(0,'rgba(255,205,70,.58)');
      sg.addColorStop(.25,'rgba(255,155,30,.3)');
      sg.addColorStop(.55,'rgba(255,95,0,.12)');
      sg.addColorStop(1,'rgba(255,50,0,0)');
      ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();
      if(wxState==='sunny'){
        ctx.save();ctx.translate(sx,sy);
        for(let i=0;i<16;i++){
          const a=i/16*Math.PI*2;
          ctx.beginPath();ctx.moveTo(Math.cos(a)*sr*.06,Math.sin(a)*sr*.06);
          ctx.lineTo(Math.cos(a)*sr*.95,Math.sin(a)*sr*.95);
          ctx.strokeStyle='rgba(255,190,50,.06)';ctx.lineWidth=22;ctx.stroke();
        }
        ctx.restore();
      }
    }

    if(wxState==='clear-night'){
      STARS.forEach(s=>{
        const twinkle=animated?.7+.3*Math.sin(driftT*1.8+s.r*7):.84;
        ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${s.op*twinkle})`;ctx.fill();
      });
      const mx=W*.72,my=H*.09,mr=26,mglow=ctx.createRadialGradient(mx,my,mr*.8,mx,my,mr*4);
      mglow.addColorStop(0,'rgba(200,215,255,.14)');mglow.addColorStop(1,'rgba(200,215,255,0)');
      ctx.beginPath();ctx.arc(mx,my,mr*4,0,Math.PI*2);ctx.fillStyle=mglow;ctx.fill();
      ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fillStyle='rgba(232,238,255,.92)';ctx.fill();
      ctx.beginPath();ctx.arc(mx+mr*.28,my-mr*.08,mr*.82,0,Math.PI*2);ctx.fillStyle=SKIES['clear-night'][0][0];ctx.fill();
    }

    (CLOUDS[wxState]||[]).forEach((c,i)=>{
      const drift=animated?Math.sin(driftT*.12+i*1.5)*.025:0;
      drawCloud((c.x+drift)*W,c.y*H,c.w*W,c.h*H,c.tc,c.bc,c.a);
    });

    if(particles.length){
      ctx.save();
      particles.forEach(p=>{
        if(animated){p.y+=p.speed;p.x-=p.speed*.12}
        if(p.y>H){p.y=-p.len;p.x=Math.random()*W}
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.len*.12,p.y+p.len);
        ctx.strokeStyle=`rgba(175,210,250,${p.op})`;
        ctx.lineWidth=wxState==='storm'?1.15:.9;ctx.stroke();
      });
      ctx.restore();
    }

    if(animated&&wxState==='storm'&&!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
      nextLightning-=dt;
      if(nextLightning<=0){lightningAlpha=.14;nextLightning=6+Math.random()*11}
      if(lightningAlpha>0){
        ctx.fillStyle=`rgba(200,220,255,${lightningAlpha})`;
        ctx.fillRect(0,0,W,H);
        lightningAlpha=Math.max(0,lightningAlpha-dt*2.2);
      }
    }
  }

  function renderStatic(){
    renderScene(0,{animated:false});
  }

  function render(ts){
    const isMobile=window.matchMedia('(max-width: 640px)').matches;
    const targetFps=isMobile?24:30;
    const perf={frameMs:1000/targetFps};
    if(!motionEnabled||document.hidden){rafId=0;return}
    if(lastTime&&ts-lastTime<perf.frameMs){rafId=requestAnimationFrame(render);return}
    const dt=Math.min((ts-lastTime)/1000,.05)||0;
    lastTime=ts;
    renderScene(dt,{animated:true});
    rafId=requestAnimationFrame(render);
  }

  function updateMotionButton(){
    if(!motionBtn) return;
    motionBtn.textContent=motionEnabled?'Ⅱ':'▶';
    motionBtn.setAttribute('aria-pressed',String(motionEnabled));
    motionBtn.setAttribute('aria-label',motionEnabled?'Stop weather animation':'Start weather animation');
  }

  function startMotion(){
    if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    document.body.classList.add('motion-on');
    motionEnabled=true;lastTime=0;updateMotionButton();
    if(!rafId) rafId=requestAnimationFrame(render);
  }

  function stopMotion(){
    motionEnabled=false;updateMotionButton();
    document.body.classList.remove('motion-on');
    if(rafId){cancelAnimationFrame(rafId);rafId=0}
    renderStatic();
  }
  window.startMotion=startMotion;
  window.stopMotion=stopMotion;

  resize();
  window.addEventListener('resize',resize);
  document.addEventListener('visibilitychange',()=>{lastTime=0;if(!document.hidden&&motionEnabled)startMotion()});
  if(motionBtn) motionBtn.addEventListener('click',()=>motionEnabled?stopMotion():startMotion());
  setWxState(new URLSearchParams(location.search).get('weather')||wxbg.className||'storm');
  new MutationObserver(()=>setWxState(wxbg.className||'storm')).observe(wxbg,{attributes:true,attributeFilter:['class']});
  stopMotion();
})();
</script>
