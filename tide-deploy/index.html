<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tide Walk Score · Myrtle Beach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05091a;--teal:#0fb8a8;--amber:#f59e0b;
  --orange:#fb923c;--sky:#7dd3fc;
  --text:#d8e8f2;--muted:#4e6e88;
  --glass:rgba(8,18,36,.88);--bdr:rgba(255,255,255,.09)
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg)}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;
  color:var(--text);display:flex;justify-content:center
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 40% at 50% 105%,rgba(15,184,168,.07) 0%,transparent 55%),
    radial-gradient(ellipse 50% 30% at 15% 5%,rgba(30,80,180,.06) 0%,transparent 50%);
  pointer-events:none;z-index:0
}
.app{
  position:relative;z-index:1;
  width:100%;max-width:390px;min-height:100svh;
  display:flex;flex-direction:column;
  padding:max(env(safe-area-inset-top),16px) 18px max(env(safe-area-inset-bottom),10px)
}
.app::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:linear-gradient(180deg,rgba(3,7,16,.18),rgba(3,7,16,.28));
  pointer-events:none
}

/* ── HEADER ── */
.hdr{display:grid;grid-template-columns:minmax(118px,1fr) auto minmax(78px,1fr);align-items:start;gap:10px;padding-bottom:4px}
.hdr-place{min-width:0}
.loc-name{font-size:19px;font-weight:500;letter-spacing:.02em;line-height:1;white-space:nowrap}
.loc-sub{
  font-size:9.8px;font-weight:600;
  color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;white-space:nowrap
}
.hdr-side{justify-self:end;display:flex;align-items:flex-start}
.weather-readout{
  justify-self:center;display:flex;align-items:center;gap:6px;color:var(--text);
  text-shadow:0 0 18px rgba(125,211,252,.12)
}
.wx-icon{font-size:17px;line-height:1}
.wx-temp{font-size:25px;font-weight:850;letter-spacing:.01em;line-height:.96}
.wx-controls{
  display:flex;align-items:center;gap:5px;
  background:var(--glass);border:1px solid var(--bdr);
  border-radius:18px;padding:4px 6px;
  backdrop-filter:blur(14px) saturate(1.25);
  -webkit-backdrop-filter:blur(14px) saturate(1.25)
}
body.motion-on .wx-controls{
  backdrop-filter:none;
  -webkit-backdrop-filter:none;
  background:rgba(8,18,36,.94)
}

/* ── LANG (globe cycle in header) ── */
.wx-lang{
  font:inherit;font-size:12px;font-weight:700;
  letter-spacing:.06em;color:var(--teal);background:none;border:none;
  padding:3px 7px;border-radius:12px;cursor:pointer;
  display:flex;align-items:center;gap:4px;transition:background .15s
}
.wx-motion{
  width:28px;height:28px;border:1px solid rgba(125,211,252,.14);border-radius:50%;
  display:grid;place-items:center;cursor:pointer;
  font:inherit;font-size:10px;font-weight:800;color:#7f9bb2;
  background:rgba(255,255,255,.06);
  transition:background .15s,color .15s,box-shadow .15s
}
.wx-motion[aria-pressed="true"]{color:var(--teal);background:rgba(15,184,168,.16);box-shadow:0 0 10px rgba(15,184,168,.22)}
.wx-lang:active,.wx-motion:active{background:rgba(15,184,168,.18)}
@keyframes lf{
  0%{opacity:1;transform:translateY(0)}
  45%{opacity:0;transform:translateY(-5px)}
  55%{opacity:0;transform:translateY(5px)}
  100%{opacity:1;transform:translateY(0)}
}
#lang-label{display:inline-block;min-width:18px;text-align:center}
.la{animation:lf .22s ease}

/* ── WEATHER BG ── */
#wxbg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}

/* ── DIAL ── */
.dial-wrap{display:flex;justify-content:center;padding:2px 0}
.dial{
  width:100%;max-width:360px;height:auto;overflow:visible;
  filter:drop-shadow(0 6px 36px rgba(15,184,168,.09))
}
#score-beacon{transition:fill .25s ease,opacity .25s ease;transform-origin:180px 180px}
@keyframes scorePulse{
  0%,100%{opacity:.86;transform:scale(1);stroke-width:1.1}
  50%{opacity:1;transform:scale(1.18);stroke-width:2.2}
}
body.motion-on #score-beacon{animation:scorePulse 1.8s ease-in-out infinite}

/* Wave animations */
@keyframes wave1{from{transform:translateX(0)}to{transform:translateX(180px)}}
@keyframes wave2{from{transform:translateX(0)}to{transform:translateX(270px)}}
body.motion-on .wave1{animation:wave1 4s linear infinite}
body.motion-on .wave2{animation:wave2 2.8s linear infinite}
@keyframes bubbleRise{
  0%{transform:translateY(0) scale(.82);opacity:0}
  12%{opacity:.55}
  82%{opacity:.38}
  100%{transform:translateY(var(--bubble-rise,-160px)) scale(1.18);opacity:0}
}
.bubble{opacity:0;transform-box:fill-box;transform-origin:center;will-change:transform,opacity}
body.motion-on .bubble{
  animation:bubbleRise var(--bubble-duration,5.8s) ease-in-out infinite;
  animation-delay:var(--bubble-delay,0s)
}

.ng{opacity:0}

@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hdr     {animation:up .5s ease  0s   both}
.dial-wrap{animation:up .5s ease .12s both}
.status  {animation:up .5s ease .30s both}
.grid    {animation:up .5s ease .40s both}
.foot    {animation:up .5s ease .50s both}

/* ── STATUS ── */
.status{
  text-align:center;padding:5px 0 8px;
  display:flex;flex-direction:column;align-items:center;gap:1px
}
.st-ey{
  font-size:9.8px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;color:#66849d
}
.st-main{
  font-size:30px;font-weight:850;letter-spacing:.04em;
  text-transform:uppercase;line-height:1;color:var(--text)
}
.st-next{font-size:13px;font-weight:550;color:var(--muted);letter-spacing:0}
.st-next .t{color:var(--teal);font-weight:500}
.st-next .d{color:var(--amber)}

/* ── METRICS PANEL ── */
.grid.metrics-panel{
  display:flex;flex-direction:column;gap:8px;flex:1;
  background:linear-gradient(180deg,rgba(21,18,49,.88),rgba(5,8,24,.92));
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;padding:14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 14px 36px rgba(0,0,0,.22);
  backdrop-filter:blur(18px) saturate(1.15);
  -webkit-backdrop-filter:blur(18px) saturate(1.15)
}
body.motion-on .grid.metrics-panel{
  backdrop-filter:none;
  -webkit-backdrop-filter:none;
  background:linear-gradient(180deg,rgba(21,18,49,.94),rgba(5,8,24,.96))
}
.score-hero{
  border:1px solid rgba(255,255,255,.09);
  border-radius:17px;padding:13px 14px 12px;
  background:rgba(255,255,255,.035)
}
.score-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.score-main{min-width:0}
.score-badge{
  border-radius:999px;padding:4px 12px;
  font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  background:rgba(248,113,113,.22);color:#fecaca
}
.score-main.safe + .score-badge{background:rgba(34,197,94,.2);color:#bbf7d0}
.score-main.caution + .score-badge{background:rgba(234,179,8,.2);color:#fef08a}
.score-number{display:flex;align-items:baseline;gap:8px;margin-top:8px;color:var(--text)}
.score-number #score-value{font-size:clamp(58px,17vw,76px);font-weight:760;line-height:.9;letter-spacing:-.01em}
.score-number small{font-size:20px;font-weight:650;color:rgba(216,232,242,.62)}
.score-main.safe .score-number #score-value{color:#4ade80}
.score-main.caution .score-number #score-value{color:#fde047}
.score-main.danger .score-number #score-value{color:#f87171}
.walk-block{
  display:grid;grid-template-columns:1fr auto;gap:10px;
  border-top:1px solid rgba(255,255,255,.08);
  margin-top:12px;padding-top:10px
}
.walk-time{font-size:clamp(23px,7vw,30px);font-weight:760;line-height:1;color:var(--text);white-space:nowrap}
.walk-note{text-align:right;color:rgba(216,232,242,.7);font-size:12px;font-weight:650;letter-spacing:.08em;text-transform:uppercase}
.metrics-factors{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric-item{
  min-height:69px;border:1px solid rgba(255,255,255,.07);
  border-radius:14px;padding:11px 13px;
  background:rgba(255,255,255,.025)
}
.metric-value{font-size:clamp(25px,7.5vw,32px);font-weight:740;line-height:1.05;color:var(--text)}
.metric-item.safe .metric-value{color:#4ade80}
.metric-item.caution .metric-value{color:#fde047}
.metric-item.danger .metric-value{color:#f87171}
.metric-value small{font-size:15px;font-weight:650;color:rgba(216,232,242,.6)}
.metric-value.wind-value{display:flex;align-items:baseline;gap:7px;white-space:nowrap}
.metric-value.compact-value{white-space:nowrap}
.metric-value.surf-value{font-size:clamp(23px,6.6vw,30px)}
.metric-value.uv-value{font-size:clamp(22px,6.2vw,29px)}
.metric-value.uv-value small{font-size:clamp(12px,3.6vw,14px)}
.wind-meta{font-size:14px;font-weight:700;color:rgba(216,232,242,.58)}
.wind-meta::before{content:'· '}

/* Status dot indicator */
.cl{
  font-size:10.8px;font-weight:650;
  letter-spacing:.055em;text-transform:uppercase;color:#6f8da5;
  margin-bottom:5px;display:flex;align-items:center;gap:5px;
  max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.cl::before{
  content:'';display:inline-block;
  width:5px;height:5px;border-radius:50%;flex-shrink:0
}
.safe .cl::before{background:#22c55e;box-shadow:0 0 5px rgba(34,197,94,.7)}
.caution .cl::before{background:#eab308;box-shadow:0 0 5px rgba(234,179,8,.7)}
.danger .cl::before{background:#ef4444;box-shadow:0 0 5px rgba(239,68,68,.7)}
.info .cl::before{background:var(--teal);box-shadow:0 0 5px rgba(15,184,168,.5)}

@media (max-width:340px){
  .hdr{grid-template-columns:minmax(0,1fr) auto}
  .weather-readout{display:none}
}

/* ── FOOTER ── */
.foot{
  text-align:center;margin-top:5px;
  font-size:8px;font-weight:600;
  letter-spacing:.11em;color:rgba(78,110,136,.45);text-transform:uppercase
}
</style>
</head>
<body>
<canvas id="wxcanvas" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0"></canvas>
<div id="wxbg" class="storm"></div>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-place">
      <div class="loc-name">Myrtle Beach</div>
      <div class="loc-sub" data-i18n="loc-sub">Local time · --:--</div>
    </div>
    <div class="weather-readout" aria-label="Current weather">
      <span class="wx-icon">⛈️</span>
      <span class="wx-temp" data-i18n="val-wx-temp">75 °F</span>
    </div>
    <div class="hdr-side">
      <div class="wx-controls" aria-label="Display controls">
        <button class="wx-motion" id="motion-btn" type="button" aria-label="Start weather animation" aria-pressed="false">▶</button>
        <button class="wx-lang" id="lang-btn">🌐 <span id="lang-label">EN</span></button>
      </div>
    </div>
  </div>

  <!-- DIAL -->
  <div class="dial-wrap">
    <svg class="dial" viewBox="-10 0 380 360" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="gBezel" cx="50%" cy="36%" r="64%">
          <stop offset="0%"   stop-color="#182e4d"/>
          <stop offset="100%" stop-color="#07101e"/>
        </radialGradient>
        <radialGradient id="gFace" cx="50%" cy="36%" r="64%">
          <stop offset="0%"   stop-color="#0d1f3a"/>
          <stop offset="65%"  stop-color="#081424"/>
          <stop offset="100%" stop-color="#050c17"/>
        </radialGradient>
        <!-- Water body gradient: deep teal at bottom, lighter at surface -->
        <linearGradient id="gWater" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="rgba(15,184,168,.18)"/>
          <stop offset="100%" stop-color="rgba(8,110,130,.36)"/>
        </linearGradient>
        <!-- Clip everything to the circular face -->
        <clipPath id="faceClip">
          <circle cx="180" cy="180" r="139"/>
        </clipPath>
        <filter id="ft" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="fa" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="scoreGlow" x="-120%" y="-120%" width="340%" height="340%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Left half CCW top→left→bottom — letters face inward (rightward) -->
        <path id="aHi" d="M 180,22 A 158,158 0 0,0 180,338"/>
        <!-- Right half CCW bottom→right→top — letters face inward (leftward) -->
        <path id="aLo" d="M 180,338 A 158,158 0 0,0 180,22"/>
      </defs>

      <!-- Bezel -->
      <circle cx="180" cy="180" r="170" fill="url(#gBezel)" stroke="rgba(255,255,255,.05)" stroke-width=".75"/>
      <circle cx="180" cy="180" r="146" fill="none" stroke="rgba(15,184,168,.12)" stroke-width=".5"/>

      <!-- Bezel arc labels — centered on full half-circles -->
      <text font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif"
            font-size="12" font-weight="650" fill="rgba(145,185,215,.88)"
            letter-spacing=".9" text-anchor="middle">
        <textPath id="tp-hi" href="#aHi" startOffset="50%">HOURS TO HIGH TIDE</textPath>
      </text>
      <text font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif"
            font-size="12" font-weight="650" fill="rgba(145,185,215,.88)"
            letter-spacing=".9" text-anchor="middle">
        <textPath id="tp-lo" href="#aLo" startOffset="50%">HOURS TO LOW TIDE</textPath>
      </text>

      <!-- SUFFER / WALK in bezel band -->
      <text x="180" y="27" dominant-baseline="central"
            font-family="'Barlow Condensed',sans-serif" font-weight="900"
            font-size="17" fill="#fb923c" text-anchor="middle"
            letter-spacing="8" filter="url(#fa)">SUFFER</text>
      <text x="180" y="333" dominant-baseline="central"
            font-family="'Barlow Condensed',sans-serif" font-weight="900"
            font-size="17" fill="#0fb8a8" text-anchor="middle"
            letter-spacing="11" filter="url(#ft)">WALK</text>

      <!-- Face background -->
      <circle cx="180" cy="180" r="140" fill="url(#gFace)"/>

      <!--
        TIDE LEVEL FILL
        Water level = 4.95 ft. Myrtle Beach tidal range ≈ 0–6 ft.
        4.95 / 6 ≈ 82% full.
        Face top y=40, bottom y=320, height=280.
        Water surface y = 40 + 280*(1-0.82) = 40 + 50 = 90
      -->

      <!-- Static water body -->
      <rect id="water-body" x="41" y="90" width="278" height="230"
            fill="url(#gWater)" clip-path="url(#faceClip)"/>

      <!-- Wave layer 1 — slow -->
      <g clip-path="url(#faceClip)">
        <path id="wave-1" class="wave1"
          d="M -180,90 Q -135,79 -90,90 Q -45,101 0,90 Q 45,79 90,90 Q 135,101 180,90 Q 225,79 270,90 Q 315,101 360,90 Q 405,79 450,90 Q 495,101 540,90 L 540,320 L -180,320 Z"
          fill="rgba(15,184,168,.13)"/>
      </g>

      <!-- Wave layer 2 — fast, offset phase -->
      <g clip-path="url(#faceClip)">
        <path id="wave-2" class="wave2"
          d="M -270,92 Q -225,82 -180,92 Q -135,102 -90,92 Q -45,82 0,92 Q 45,102 90,92 Q 135,82 180,92 Q 225,102 270,92 Q 315,82 360,92 Q 405,102 450,92 Q 495,82 540,92 L 540,320 L -270,320 Z"
          fill="rgba(15,184,168,.09)"/>
      </g>

      <!-- Motion-only water bubbles -->
      <g clip-path="url(#faceClip)">
        <circle class="bubble b1" cx="142" cy="294" r="2.7" fill="rgba(184,245,255,.58)"/>
        <circle class="bubble b2" cx="205" cy="306" r="2.1" fill="rgba(184,245,255,.5)"/>
        <circle class="bubble b3" cx="238" cy="286" r="1.8" fill="rgba(184,245,255,.46)"/>
      </g>

      <!-- Subtle surface highlight line -->
      <line id="water-line" x1="41" y1="90" x2="319" y2="90"
            stroke="rgba(15,220,200,.25)" stroke-width=".75"
            clip-path="url(#faceClip)"/>

      <!-- Face border ring -->
      <circle cx="180" cy="180" r="140" fill="none" stroke="rgba(15,184,168,.2)" stroke-width=".75"/>

      <!-- Ticks + numbers injected by JS -->
      <g id="ticks"/>
      <g id="nums"
         font-family="'Barlow Condensed',sans-serif" font-weight="700" font-size="19"
         text-anchor="middle" dominant-baseline="central"/>

      <!-- Needle -->
      <g id="needle-group" class="ng">
        <!-- drop shadow -->
        <line x1="181" y1="193" x2="181" y2="68"
              stroke="rgba(0,0,0,.45)" stroke-width="4" stroke-linecap="round"/>
        <!-- counterweight tail -->
        <line x1="180" y1="192" x2="174" y2="215"
              stroke="var(--amber)" stroke-width="2.5" stroke-linecap="round" opacity=".45"/>
        <!-- shaft -->
        <line x1="180" y1="192" x2="180" y2="75"
              stroke="var(--amber)" stroke-width="2" stroke-linecap="round"/>
        <!-- arrowhead -->
        <polygon points="180,67 175,79 185,79" fill="var(--amber)" filter="url(#fa)"/>
      </g>

      <!-- Pivot -->
      <circle id="score-beacon" cx="180" cy="180" r="13" fill="#eab308" stroke="rgba(255,255,255,.58)" stroke-width="1.1" filter="url(#scoreGlow)"/>
      <circle cx="180" cy="180" r="6.5" fill="#06101e" stroke="rgba(255,255,255,.26)" stroke-width="1"/>
      <circle cx="180" cy="180" r="2"   fill="#d8e8f2"/>
    </svg>
  </div>

  <!-- STATUS -->
  <div class="status">
    <span class="st-ey" data-i18n="st-ey">Current condition</span>
    <span id="tide-status" class="st-main" data-i18n="st-main">Falling Tide</span>
    <span class="st-next">
      <span id="next-tide-label" data-i18n="next-low">Next low</span>
      <span id="next-tide-time" class="t" data-i18n="next-tide-time">09:12 AM</span> ·
      <span data-i18n="in-word">in</span>
      <span id="next-tide-duration" class="d">5 h 12 m</span>
    </span>
  </div>

  <!-- METRICS PANEL -->
  <div class="grid metrics-panel">
    <div class="score-hero">
      <div class="score-top">
        <div class="score-main caution" id="score-card">
          <div class="cl" data-i18n="tide-walk-score">Current walk rating</div>
          <div class="score-number"><span id="score-value">61</span><small>/100</small></div>
        </div>
        <span class="score-badge" id="score-label">fair</span>
      </div>
      <div class="walk-block">
        <div>
          <div class="cl info" data-i18n="walk-window">Best walk window</div>
          <div id="walk-time-value" class="walk-time" data-i18n="walk-time-value">08:12–10:42 AM</div>
        </div>
      </div>
    </div>
    <div class="metrics-factors">
      <div class="metric-item safe">
        <div class="cl" data-i18n="water-temp">Water</div>
        <div class="metric-value"><span data-i18n="val-water-temp">79°F</span></div>
      </div>
      <div class="metric-item caution">
        <div class="cl" data-i18n="wind">Wind</div>
        <div class="metric-value wind-value"><span data-i18n="val-wind-speed">10–15</span><small data-i18n="unit-wind"> mph</small><span class="wind-meta" data-i18n="val-wind-dir">S</span></div>
      </div>
      <div class="metric-item safe">
        <div class="cl" data-i18n="uv-index">UV</div>
        <div class="metric-value compact-value uv-value">0.0<small data-i18n="low-val"> · low</small></div>
      </div>
      <div class="metric-item caution">
        <div class="cl" data-i18n="surf-height">Surf</div>
        <div class="metric-value compact-value surf-value"><span data-i18n="val-surf-height">2–3</span><small data-i18n="unit-surf-height"> ft</small></div>
      </div>
    </div>
  </div>

  <div class="foot" data-i18n="data-updated">NOAA data · updated 04:00</div>

</div>
<script>
(function(){
  /* ── Translations ── */
  const T = {
    en: {
      'loc-label':    'Local time',
      'st-ey':        'Current condition',
      'st-main':      'High / Low Tide',
      'next-low':     'Next low',
      'next-high':    'Next high',
      'next-tide-time':'09:12 AM',
      'in-word':      'in',
      'rising-tide':  'High Tide',
      'falling-tide': 'Low Tide',
      'now-until':    'Now until',
      'window-passed':'Window passed',

  function weatherCodeToState(code, fallback = '') {

    if ([45,48,71,73,75,77,85,86].includes(code) || /snow|fog|туман/.test(text)) return 'cloudy';
    if ([1,2].includes(code) || /partly|mostly sunny|перем/.test(text)) return 'partly-cloudy';

  function walkWindowForLow(lowTime) {

      || null;
  }

  function tideWindowScore(now, lowTime) {
    const window = walkWindowForLow(lowTime);
    if (!window) return 55;
    if (now >= window.start && now <= window.end) {
      const fromLow = Math.abs(now - lowTime) / 60000;
      return clamp(100 - fromLow * 0.12, 88, 100);
    }
    const distanceMinutes = now < window.start
      ? (window.start - now) / 60000
      : (now - window.end) / 60000;
    return clamp(85 - distanceMinutes * 0.32, 20, 85);

  function calculateTideWalkScore(weatherState = liveState.weatherState || document.body.dataset.weather || 'storm') {
    const now = liveState.tide?.currentTime || new Date();
    const walkLow = liveState.tide?.walkLow?.time || null;
    const factors = {
      tideWindow: tideWindowScore(now, walkLow),
      uv: uvScore(liveState.uv),
      waterTemp: waterTempScore(liveState.waterTempC),
      wind: windScore(liveState.windMps),
      surf: surfScore(liveState.waveHeightM),
      tideLevel: liveState.tide?.fillRatio != null ? clamp(100 - liveState.tide.fillRatio * 40, 45, 90) : 65,
      weather: ({ sunny:88, 'partly-cloudy':90, cloudy:78, rain:55, storm:20, 'clear-night':84 })[weatherState] ?? 70,
    };
    let score = Math.round(
      factors.tideWindow*.35 + factors.weather*.20 + factors.wind*.15 +
      factors.surf*.10 + factors.uv*.10 + factors.waterTemp*.05 + factors.tideLevel*.05
    );
    const caps = { rain:75, storm:35 };
    if (caps[weatherState] != null) score = Math.min(score, caps[weatherState]);

  function setNeedleAngle(angle) {
    const needle = document.getElementById('needle-group');
    if (!needle) return;
    const target = angle.toFixed(2);
    needle.classList.remove('ng');
    needle.removeAttribute('style');
    if (needleIntroStarted && !needleSettled) return;
    if (needleSettled || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      needle.setAttribute('transform', `rotate(${target} 180 180)`);
      needleIntroStarted = true;
      needleSettled = true;
      return;
    }
    if (needleAnimationFrame) cancelAnimationFrame(needleAnimationFrame);
    needleIntroStarted = true;
    const duration = 2100;
    const start = performance.now();
    const settleProgress = t => {
      if (t < 0.68) {
        const p = t / 0.68;
        return 1 - Math.pow(1 - p, 3);
      }
      const p = (t - 0.68) / 0.32;
      return 1 + Math.sin(p * Math.PI * 6) * Math.pow(1 - p, 2) * 0.045;
    };
    needle.setAttribute('transform', 'rotate(0 180 180)');
    const tick = now => {
      const t = Math.min(1, (now - start) / duration);
      const current = angle * settleProgress(t);
      needle.setAttribute('transform', `rotate(${current.toFixed(2)} 180 180)`);
      if (t < 1) {
        needleAnimationFrame = requestAnimationFrame(tick);
        return;
      }
      needle.setAttribute('transform', `rotate(${target} 180 180)`);
      needleAnimationFrame = 0;
      needleSettled = true;
    };
    needleAnimationFrame = requestAnimationFrame(tick);

  function placeBubble(bubble, waterY) {
    if (!bubble || waterY == null) return;
    const faceCenterX = 180;
    const faceCenterY = 180;
    const faceRadius = 139;
    const startY = Math.min(318, Math.max(waterY + 6, 302 + Math.random() * 12));
    const yOffset = startY - faceCenterY;
    const halfWidth = Math.max(14, Math.sqrt(Math.max(0, faceRadius * faceRadius - yOffset * yOffset)) - 8);
    const x = faceCenterX + (Math.random() * 2 - 1) * halfWidth;
    const rise = Math.max(0, startY - waterY - 2);
    bubble.setAttribute('cx', x.toFixed(1));
    bubble.setAttribute('cy', startY.toFixed(1));
    bubble.style.setProperty('--bubble-rise', `-${rise.toFixed(1)}px`);

  async function loadTides() {
    const latest = await fetchJson(noaaUrl({
      date: 'latest',
      station: STATION_ID,
      product: 'water_level',
      datum: 'MLLW',
      units: 'metric',
      time_zone: 'lst_ldt',
      application: 'TideWalkScore',
      format: 'json',
    }));
    if (!latest.data?.length) throw new Error('NOAA water_level unavailable');
    const currentLevel = Number(latest.data[0].v);
    const currentTime = parseNoaaLocalTime(latest.data[0].t);
    const beginDate = noaaDate(new Date(currentTime.getTime() - 24 * 3600000));
    const predictions = await fetchJson(noaaUrl({
      product: 'predictions',
      begin_date: beginDate,
      range: '72',
      datum: 'MLLW',
      station: STATION_ID,
      time_zone: 'lst_ldt',
      units: 'metric',
      interval: 'hilo',
      application: 'TideWalkScore',
      format: 'json',
    }));
    const hilo = (predictions.predictions || [])
      .map(item => ({ time: parseNoaaLocalTime(item.t), height: Number(item.v), type: item.type }))
      .filter(item => Number.isFinite(item.height) && (item.type === 'H' || item.type === 'L'))
      .sort((a, b) => a.time - b.time);
    if (hilo.length < 2) throw new Error('NOAA hilo predictions unavailable');
    let previous = null;
    let next = null;
    for (let i = 0; i < hilo.length - 1; i += 1) {
      if (hilo[i].time <= currentTime && currentTime <= hilo[i + 1].time) {
        previous = hilo[i];
        next = hilo[i + 1];
        break;
      }
    }
    if (!previous || !next) {
      next = hilo.find(item => item.time > currentTime) || hilo[hilo.length - 1];
      previous = hilo[Math.max(0, hilo.indexOf(next) - 1)];
    }
    const total = next.time - previous.time;
    const progress = total > 0 ? clamp((currentTime - previous.time) / total, 0, 1) : 0;
    const lowHeight = Math.min(previous.height, next.height);
    const highHeight = Math.max(previous.height, next.height);
    const fillRatio = highHeight > lowHeight ? clamp((currentLevel - lowHeight) / (highHeight - lowHeight), 0, 1) : progress;
    liveState.tide = {
      currentTime,
      currentLevel,
      previous,
      next,
      progress,
      fillRatio,
      falling: previous.type === 'H',
      walkLow: nextWalkLow(hilo, currentTime),
    };
    liveState.updatedAt = currentTime;
  }

  async function loadNoaaProduct(product) {
    const data = await fetchJson(noaaUrl({
      date: 'latest',
      station: STATION_ID,
      product,
      units: 'metric',
      time_zone: 'lst_ldt',
      application: 'TideWalkScore',
      format: 'json',
    }));
    return data.data?.[0] || null;
  }

  async function loadWaterTemperature() {
    try {
      const row = await loadNoaaProduct('water_temperature');
      const value = Number(row?.v);
      if (Number.isFinite(value)) liveState.waterTempC = value;
    } catch (error) {
      console.warn('water_temperature unavailable', error);
    }
  }

  async function loadWind() {
    try {
      const row = await loadNoaaProduct('wind');
      const speed = Number(row?.s);
      const gust = Number(row?.g);
      const direction = Number(row?.d);
      if (liveState.windSource === 'nws') return;
      if (Number.isFinite(speed)) liveState.windMps = speed;
      if (Number.isFinite(gust)) liveState.windGustMps = gust;
      if (Number.isFinite(direction)) liveState.windDirectionDeg = direction;
      liveState.windDirText = row?.dr || '';
      liveState.windSource = 'noaa';
    } catch (error) {
      console.warn('wind unavailable', error);
    }
  }

  async function loadWeather() {
    try {
      const point = await fetchJson(NWS_POINTS_API);
      const hourlyUrl = point.properties?.forecastHourly;
      if (hourlyUrl) {
        const hourly = await fetchJson(hourlyUrl);
        const period = hourly.properties?.periods?.[0];
        if (period) {
          const wind = parseWindMph(period.windSpeed);
          if (wind) {
            liveState.windMps = wind.lowMps;
            liveState.windGustMps = wind.highMps;
            liveState.windDirectionDeg = degreesFromDirection(period.windDirection);
            liveState.windDirText = period.windDirection || '';
            liveState.windSource = 'nws';
          }
          liveState.nwsWeatherState = weatherCodeToState(null, period.shortForecast || '');
          liveState.weatherState = reconcileWeatherState();
        }
      }
    } catch (error) {
      console.warn('NWS weather unavailable', error);
    }
  }

  async function loadOpenMeteo() {
    try {
      const forecast = await fetchJson(openMeteoUrl(OPEN_METEO_API, {
        latitude: SPRINGMAID.lat,
        longitude: SPRINGMAID.lon,
        current: 'temperature_2m,weather_code,uv_index',
        temperature_unit: 'celsius',
        wind_speed_unit: 'ms',
        timezone: 'America/New_York',
      }));
      const current = forecast.current || {};
      const temp = Number(current.temperature_2m);
      const uv = Number(current.uv_index);
      const code = Number(current.weather_code);
      if (Number.isFinite(temp)) liveState.airTempC = temp;
      if (Number.isFinite(uv)) liveState.uv = uv;
      if (Number.isFinite(code)) liveState.openMeteoWeatherState = weatherCodeToState(code);
      liveState.weatherState = reconcileWeatherState();
    } catch (error) {
      console.warn('Open-Meteo forecast unavailable', error);
    }
    try {
      const marine = await fetchJson(openMeteoUrl(OPEN_METEO_MARINE_API, {
        latitude: SPRINGMAID.lat,
        longitude: SPRINGMAID.lon,
        current: 'wave_height',
        timezone: 'America/New_York',
      }));
      const wave = Number(marine.current?.wave_height);
      if (Number.isFinite(wave)) liveState.waveHeightM = wave;
    } catch (error) {
      console.warn('Open-Meteo marine unavailable', error);
    }
  }

  async function refreshLiveData() {
    try {
      await loadTides();
      renderLiveData();
    } catch (error) {
      console.warn('NOAA tide data unavailable', error);
    }
    await Promise.allSettled([
      loadWaterTemperature(),
      loadWind(),
      loadWeather(),
      loadOpenMeteo(),
    ]);
    if (window.setWeatherVisual) window.setWeatherVisual(liveState.weatherState);
    renderLiveData();
  }

  function applyLang(lang) {
    const d = T[lang] || T.en;
    document.documentElement.lang = lang === 'ua' ? 'uk' : lang;
    // HTML elements
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (d[key] != null) el.textContent = d[key];
    });
    updateLocalTime(lang);
    // SVG textPath elements
    const tpHi = document.getElementById('tp-hi');
    const tpLo = document.getElementById('tp-lo');
    if (tpHi) tpHi.textContent = d['bezel-hi'];
    if (tpLo) tpLo.textContent = d['bezel-lo'];
    renderLiveData();
  }

  /* ── Tick marks ── */
  const X=180,Y=180,NR=105;
  const tg=document.getElementById('ticks');
  for(let i=0;i<60;i++){
    const a=i/60*2*Math.PI-Math.PI/2,maj=i%5===0;
    const r1=138,r2=maj?121:129;
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',(X+r1*Math.cos(a)).toFixed(2));
    l.setAttribute('y1',(Y+r1*Math.sin(a)).toFixed(2));
    l.setAttribute('x2',(X+r2*Math.cos(a)).toFixed(2));
    l.setAttribute('y2',(Y+r2*Math.sin(a)).toFixed(2));
    l.setAttribute('stroke',maj?'rgba(112,151,184,.65)':'rgba(112,151,184,.27)');
    l.setAttribute('stroke-width',maj?'1.8':'1');
    l.setAttribute('stroke-linecap','round');
    tg.appendChild(l);
  }

  /* ── Numbers ── */
  const ng=document.getElementById('nums');
  // Left orange — hours to HIGH TIDE: 1@330° … 5@210°
  [330,300,270,240,210].forEach((d,i)=>{
    const r=(d-90)*Math.PI/180;
    const el=document.createElementNS('http://www.w3.org/2000/svg','text');
    el.setAttribute('x',(X+NR*Math.cos(r)).toFixed(1));
    el.setAttribute('y',(Y+NR*Math.sin(r)).toFixed(1));
    el.setAttribute('fill','#fb923c');el.setAttribute('opacity','.88');
    el.textContent=String(i+1);ng.appendChild(el);
  });
  // Right sky — hours to LOW TIDE: 5@30° … 1@150°
  [30,60,90,120,150].forEach((d,i)=>{
    const r=(d-90)*Math.PI/180;
    const el=document.createElementNS('http://www.w3.org/2000/svg','text');
    el.setAttribute('x',(X+NR*Math.cos(r)).toFixed(1));
    el.setAttribute('y',(Y+NR*Math.sin(r)).toFixed(1));
    el.setAttribute('fill','#7dd3fc');el.setAttribute('opacity','.88');
    el.textContent=String(5-i);ng.appendChild(el);
  });

  /* ── Language cycler (globe tap) ── */
  const langSeq=['en','ru','ua','es'],langCode={en:'EN',ru:'RU',ua:'UA',es:'ES'};
  let langIdx=0,currentLang='en';
  applyLang(currentLang);
  refreshLiveData();
  setInterval(refreshLiveData, 15 * 60 * 1000);
  setInterval(()=>updateLocalTime(currentLang),60000);
  document.getElementById('lang-btn').addEventListener('click',()=>{
    langIdx=(langIdx+1)%langSeq.length;
    currentLang=langSeq[langIdx];
    const lbl=document.getElementById('lang-label');
    lbl.classList.remove('la');void lbl.offsetWidth;lbl.classList.add('la');
    lbl.textContent=langCode[currentLang];
    applyLang(currentLang);
  });
  document.querySelectorAll('.bubble').forEach(bubble => {
    bubble.addEventListener('animationiteration', () => {
      const waterY = Number(bubble.dataset.waterY);
      if (Number.isFinite(waterY)) {
        placeBubble(bubble, waterY);
        setBubbleTiming(bubble);
      }
    });
  });
})();

    target.save();

    setWxState(wxbg.className || 'storm');
    new MutationObserver(()=>setWxState(wxbg.className || 'storm'))
      .observe(wxbg, {attributes:true, attributeFilter:['class']});
  }

  function drawBackdrop(target, { animated = false } = {}){

    // Sky
    const skyStops = SKIES[wxState] || SKIES.storm;
    const skyGrad = target.createLinearGradient(0, 0, 0, H);
    skyStops.forEach(([c,p]) => skyGrad.addColorStop(p, c));
    target.fillStyle = skyGrad;
    target.fillRect(0, 0, W, H);

    // Sun / warm glow
    if(wxState === 'sunny' || wxState === 'partly-cloudy'){
      const sx = W * 0.9, sy = H * -0.04;
      const sr = Math.min(W, H) * (wxState === 'sunny' ? 0.55 : 0.40);
      const sg = target.createRadialGradient(sx, sy, 0, sx, sy, sr);
      sg.addColorStop(0,   'rgba(255,195,55,0.55)');
      sg.addColorStop(0.25,'rgba(255,145,20,0.28)');
      sg.addColorStop(0.55,'rgba(255,85,0,0.10)');
      sg.addColorStop(1,   'rgba(255,50,0,0)');
      target.beginPath(); target.arc(sx, sy, sr, 0, Math.PI*2);
      target.fillStyle = sg; target.fill();

      if(wxState === 'sunny'){
        target.save();
        target.translate(sx, sy);
        for(let i=0;i<16;i++){
          const a = (i/16)*Math.PI*2;
          target.beginPath();
          target.moveTo(Math.cos(a)*sr*0.06, Math.sin(a)*sr*0.06);
          target.lineTo(Math.cos(a)*sr*0.95, Math.sin(a)*sr*0.95);
          target.strokeStyle = 'rgba(255,190,50,0.055)';
          target.lineWidth = 22;
          target.stroke();
        }
        target.restore();
      }
    }

    // Moon + stars (clear-night)
    if(wxState === 'clear-night'){
      STARS.forEach(s => {
        const twinkle = animated ? 0.7 + 0.3 * Math.sin(driftT * 1.8 + s.r * 7) : 0.84;
        target.beginPath();
        target.arc(s.x * W, s.y * H, s.r, 0, Math.PI*2);
        target.fillStyle = `rgba(255,255,255,${s.op * twinkle})`;
        target.fill();
      });
      const mx = W*0.72, my = H*0.09, mr = 26;
      const mglow = target.createRadialGradient(mx,my,mr*0.8,mx,my,mr*4);
      mglow.addColorStop(0,'rgba(200,215,255,0.14)');
      mglow.addColorStop(1,'rgba(200,215,255,0)');
      target.beginPath(); target.arc(mx, my, mr*4, 0, Math.PI*2);
      target.fillStyle = mglow; target.fill();
      target.beginPath(); target.arc(mx, my, mr, 0, Math.PI*2);
      target.fillStyle = 'rgba(232,238,255,0.92)'; target.fill();
      target.beginPath(); target.arc(mx+mr*0.28, my-mr*0.08, mr*0.82, 0, Math.PI*2);
      target.fillStyle = SKIES['clear-night'][0][0]; target.fill();
    }

    // Clouds are cached for animated mode; drift is used only for desktop/static rendering.
    const clouds = CLOUDS[wxState] || [];
    clouds.forEach((c, i) => {
      const drift = animated ? Math.sin(driftT * 0.12 + i * 1.5) * 0.025 : 0;
      drawCloud(
        target,
        (c.x + drift) * W,
        c.y * H,
        c.w * W,
        c.h * H,
        c.tc, c.bc, c.a
      );
    });
  }

  function drawWeatherOverlay(dt, { animated = false } = {}){
    // Rain particles
    if(particles.length > 0){
      ctx.save();
      particles.forEach(p => {
        if(animated){
          p.y += p.speed;
          p.x -= p.speed * 0.12;
        }
        if(p.y > H){ p.y = -p.len; p.x = Math.random() * W; }
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - p.len*0.12, p.y + p.len);
        ctx.strokeStyle = `rgba(175,210,250,${p.op})`;
        ctx.lineWidth = wxState === 'storm' ? 1.4 : 1.0;
        ctx.stroke();
      });
      ctx.restore();
    }

    // Lightning flash (storm only)
    if(animated && wxState === 'storm' && !window.matchMedia('(prefers-reduced-motion: reduce)').matches){
      nextLightning -= dt;
      if(nextLightning <= 0){
        lightningAlpha = 0.18;
        nextLightning = 5 + Math.random() * 10;
      }
      if(lightningAlpha > 0){
        ctx.fillStyle = `rgba(200,220,255,${lightningAlpha})`;
        ctx.fillRect(0, 0, W, H);
        if(lightningAlpha > 0.14){
          setTimeout(()=>{ lightningAlpha = 0.12; }, 80);
          setTimeout(()=>{ lightningAlpha = 0; }, 160);
        } else {
          lightningAlpha = Math.max(0, lightningAlpha - dt * 2.5);
        }
      }
    }
  }

  function rebuildStaticLayer(){
    if(!Number.isFinite(W) || !Number.isFinite(H)) return;
    staticCtx.clearRect(0, 0, W, H);
    drawBackdrop(staticCtx, { animated: false });
  }

  function renderScene(dt, { animated = false } = {}){
    if(animated) driftT += dt;
    ctx.clearRect(0, 0, W, H);
    if(animated && staticCanvas.width && staticCanvas.height){
      ctx.drawImage(staticCanvas, 0, 0, W, H);
    } else {
      drawBackdrop(ctx, { animated });
    }
    drawWeatherOverlay(dt, { animated });
  }

  function renderStatic(){
    renderScene(0, { animated: false });
  }

  function render(ts){
    const isMobile = window.matchMedia('(max-width: 640px)').matches;
    const targetFps = isMobile ? 12 : 20;
    const frameMs = 1000 / targetFps;
    rafId = 0;
    if(!motionEnabled || document.hidden){ rafId = 0; return; }
    const dt = Math.min((ts - lastTime) / 1000, 0.05) || 0;
    lastTime = ts;
    renderScene(dt, { animated: true });
    frameTimer = window.setTimeout(() => {
      if(motionEnabled && !document.hidden) rafId = requestAnimationFrame(render);
    }, frameMs);
  }

  function updateMotionButton(){
    if(!motionBtn) return;
    motionBtn.textContent = motionEnabled ? 'Ⅱ' : '▶';
    motionBtn.setAttribute('aria-pressed', String(motionEnabled));
    motionBtn.setAttribute('aria-label', motionEnabled ? 'Stop weather animation' : 'Start weather animation');
  }

  function startMotion(){
    if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    document.body.classList.add('motion-on');
    motionEnabled = true;
    lastTime = 0;
    updateMotionButton();
    if(!rafId) rafId = requestAnimationFrame(render);
  }

  function stopMotion(){
    motionEnabled = false;
    updateMotionButton();
    document.body.classList.remove('motion-on');
    if(rafId){
      cancelAnimationFrame(rafId);
      rafId = 0;
    }
    if(frameTimer){
      clearTimeout(frameTimer);
      frameTimer = 0;
    }
    renderStatic();
  }
  window.startMotion = startMotion;
  window.stopMotion = stopMotion;

  resize();
  window.addEventListener('resize', resize);
  initParticles(wxState);
  document.addEventListener('visibilitychange',()=>{ lastTime = 0; if(!document.hidden && motionEnabled) startMotion(); });
  if(motionBtn) motionBtn.addEventListener('click',()=>motionEnabled ? stopMotion() : startMotion());
  stopMotion();
})();
</script>
</body>
</html>
